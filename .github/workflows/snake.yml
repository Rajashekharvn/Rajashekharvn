name: Generate GitHub Contribution Snake 🐍

on:
  schedule:
    - cron: "0 0 * * *"     # Runs every day at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Generate the snake SVG with purple blocks and purple snake
      - name: Generate Snake Animation (Purple Theme)
        uses: Platane/snk@v3
        with:
          github_user_name: Rajashekharvn
          # 👇 custom output URLs with custom palette & colors
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-purple&color_snake=#c084f5
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#c084f5
          # 👇 optional extra colors for dots (gradient of purple tones)
          color_dots: "#ede9fe,#d8b4fe,#c084f5,#a855f7,#7e22ce"

      # ✅ Push generated files to the output branch
      - name: Push Snake Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
