name: Generate GitHub Contribution Snake 🐍

on:
  schedule:
    - cron: '0 0 * * *'     # Runs every day at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Generate the snake SVGs only (no GIF/MP4 outputs)
      - name: Generate Snake Animation (Bright Neon Green + Purple Theme)
        uses: Platane/snk@v3
        with:
          github_user_name: Rajashekharvn
          # Only SVG outputs included — no GIF/MP4 to avoid playbar UI
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-purple&color_snake=#bb00ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#bb00ff
          # Bright purple + neon greens for dots
          color_dots: "#f9e0ff,#f0b3ff,#e066ff,#39ff14,#66ff66"

      # ---------- NEW: remove play / progress controls from SVGs ----------
      - name: Remove play / progress controls from SVGs
        run: |
          set -euo pipefail

          if [ ! -d dist ]; then
            echo "dist directory not found — nothing to postprocess."
            exit 0
          fi

          apt-get update -y
          apt-get install -y xmlstarlet

          for f in dist/*.svg; do
            [ -f "$f" ] || continue
            echo "Processing $f"
            # keep a backup just in case
            cp -v "$f" "$f.bak"

            # Remove nodes that commonly implement the player UI:
            # - elements with id/class containing "controls" or "player"
            # - foreignObject blocks (used for HTML-like controls)
            # - script blocks (if the control is JS-based)  <-- optional, remove if you still need scripts
            # - wide rects (width > 600px), which often are the progress bar
            xmlstarlet ed -P \
              -d "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'controls')]" \
              -d "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'controls')]" \
              -d "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'player')]" \
              -d "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'player')]" \
              -d "//foreignObject" \
              -d "//script" \
              -d "//rect[number(@width) > 600]" \
              "$f" > "$f.tmp" && mv "$f.tmp" "$f" || (echo "xmlstarlet failed for $f" && exit 1)

            echo "Saved cleaned $f (backup at $f.bak)"
          done

      # Add a glow aura to the bright green dots in each SVG
      - name: Add glow aura to green dots
        run: |
          set -euo pipefail

          # Ensure dist exists
          if [ ! -d dist ]; then
            echo "dist directory not found — nothing to postprocess."
            exit 0
          fi

          # SVG filter definition (Gaussian blur + merge for glow)
          read -r -d '' GLOW_DEF <<'EOF' || true
          <defs>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <!-- Wider glow: increase stdDeviation if you want stronger glow -->
              <feGaussianBlur stdDeviation="4" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          EOF

          for f in dist/*.svg; do
            [ -f "$f" ] || continue

            # Insert defs after the opening <svg ...> tag if glow not already present
            if ! grep -q 'id="glow"' "$f"; then
              awk -v glow="$GLOW_DEF" '{
                if (!inserted && match($0, /<svg[^>]*>/)) {
                  print $0
                  print glow
                  inserted=1
                } else {
                  print $0
                }
              }' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            fi

            # Attach the filter to our bright green fills used for dots.
            # Update these hexes if your SVG uses different green hex codes.
            sed -i 's/fill="#39ff14"/fill="#39ff14" filter="url(#glow)"/g' "$f"
            sed -i 's/fill="#66ff66"/fill="#66ff66" filter="url(#glow)"/g' "$f"

            # Handle single-quote variants or lowercase hex just in case
            sed -i "s/fill='#39ff14'/fill='#39ff14' filter='url(#glow)'/g" "$f" || true
            sed -i "s/fill='#66ff66'/fill='#66ff66' filter='url(#glow)'/g" "$f" || true
            sed -i 's/fill="#39ff14"/fill="#39ff14" filter="url(#glow)"/Ig' "$f" || true
            sed -i 's/fill="#66ff66"/fill="#66ff66" filter="url(#glow)"/Ig' "$f" || true
          done

      # Commit + push processed SVGs to output branch (GitHub Pages / static hosting)
      - name: Push Snake Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
