name: Generate GitHub Contribution Snake 🐍

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake Animation (Bright Neon Green + Purple Theme)
        uses: Platane/snk@v3
        with:
          github_user_name: Rajashekharvn
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-purple&color_snake=#bb00ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#bb00ff
          color_dots: "#f9e0ff,#f0b3ff,#e066ff,#39ff14,#66ff66"

      - name: Hide play / progress controls in SVGs (hide-not-delete)
        run: |
          set -euo pipefail
          if [ ! -d dist ]; then
            echo "dist directory not found — nothing to postprocess."
            exit 0
          fi
          apt-get update -y
          apt-get install -y xmlstarlet
          for f in dist/*.svg; do
            [ -f "$f" ] || continue
            cp -v "$f" "$f.bak"
            xmlstarlet ed -P \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'controls') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'controls') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'player') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'player') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'play') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'play') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'progress') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'progress') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'bar') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'bar') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'seek') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'seek') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'timeline') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'timeline') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'scrub') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'scrub') and not(@style)]/@style" -t attr -n style -v "display:none" \
              -i "//foreignObject[not(@style)]/@style" -t attr -n style -v "display:none" \
              "$f" > "$f.tmp1" && mv "$f.tmp1" "$f"
            xmlstarlet ed -P \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'controls')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'controls')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'player')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'player')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'play')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'play')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'progress')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'progress')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'bar')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'bar')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'seek')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'seek')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'timeline')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'timeline')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@id,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'scrub')]/@style" -x "concat(@style,';display:none')" \
              -u "//*[contains(translate(@class,'ABCDEFGHIJKLMNOPQRSTUVWXYZ','abcdefghijklmnopqrstuvwxyz'),'scrub')]/@style" -x "concat(@style,';display:none')" \
              -u "//foreignObject/@style" -x "concat(@style,';display:none')" \
              "$f" > "$f.tmp2" && mv "$f.tmp2" "$f" || true
          done

      - name: Add glow aura to green dots
        run: |
          set -euo pipefail
          if [ ! -d dist ]; then
            echo "dist directory not found — nothing to postprocess."
            exit 0
          fi
          read -r -d '' GLOW_DEF <<'EOF' || true
          <defs>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="4" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          EOF
          for f in dist/*.svg; do
            [ -f "$f" ] || continue
            if ! grep -q 'id="glow"' "$f"; then
              awk -v glow="$GLOW_DEF" '{
                if (!inserted && match($0, /<svg[^>]*>/)) {
                  print $0
                  print glow
                  inserted=1
                } else {
                  print $0
                }
              }' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            fi
            sed -i 's/fill="#39ff14"/fill="#39ff14" filter="url(#glow)"/g' "$f"
            sed -i 's/fill="#66ff66"/fill="#66ff66" filter="url(#glow)"/g' "$f"
            sed -i "s/fill='#39ff14'/fill='#39ff14' filter='url(#glow)'/g" "$f" || true
            sed -i "s/fill='#66ff66'/fill='#66ff66' filter='url(#glow)'/g" "$f" || true
            sed -i 's/fill="#39ff14"/fill="#39ff14" filter="url(#glow)"/Ig' "$f" || true
            sed -i 's/fill="#66ff66"/fill="#66ff66" filter="url(#glow)"/Ig' "$f" || true
          done

      - name: Push Snake Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
YAML
