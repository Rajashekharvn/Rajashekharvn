name: Generate GitHub Contribution Snake 🐍

on:
  schedule:
    - cron: "0 0 * * *"     # Runs every day at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Generate the snake SVG with ultra-bright purple & green tones
      - name: Generate Snake Animation (Vivid Neon Purple + Green Theme)
        uses: Platane/snk@v3
        with:
          github_user_name: Rajashekharvn
          # 👇 custom output URLs with neon purple snake
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-purple&color_snake=#bb00ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#bb00ff
          # 👇 ultra-bright purple + bright green gradient for dots
          color_dots: "#f9e0ff,#f0b3ff,#e066ff,#00ff99,#00ffcc"

      # ✅ Push generated files to the output branch
      - name: Push Snake Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
