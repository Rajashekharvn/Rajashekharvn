name: Generate GitHub Contribution Snake 🐍

on:
  schedule:
    - cron: "0 0 * * *"     # Runs every day at midnight
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Generate the snake SVG with brighter purple tones
      - name: Generate Snake Animation (Bright Purple Theme)
        uses: Platane/snk@v3
        with:
          github_user_name: Rajashekharvn
          # 👇 custom output URLs with bright purple palette
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-purple&color_snake=#c084f5
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#c084f5
          # 👇 brighter and more vivid purple/lavender gradient for dots
          color_dots: "#f5e1ff,#e1b5ff,#ce7aff,#b44cff,#9b1dff"

      # ✅ Push generated files to the output branch
      - name: Push Snake Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
